<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>fufuziks</title>
  <link rel="preconnect" href="https://googleapis.com">
  <link href="https://googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mono: 'Roboto Mono', monospace;
      --text: #e8e8e8;
      --muted: #666;
      --card-bg: #0a0a0a; /* Строгий темный цвет карточки */
      --card-border: rgba(255,255,255,0.1); /* Белая полупрозрачная рамка */
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      color: var(--text);
      background: #000000; /* Полностью черный фон */
    }

    .card {
      position: relative; z-index: 10;
      width: 320px; 
      background: var(--card-bg); 
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 2rem 1.75rem 1.75rem;
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
      box-shadow: 0 8px 48px rgba(0,0,0,0.8);
      animation: cardIn .7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform:translateY(22px) scale(.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .avatar-wrap {
      position: relative;
      width: 88px; height: 88px;
    }
    
    .avatar-ring {
      position: absolute; inset: -3px; border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .status-dot {
      position: absolute; bottom: 5px; right: 5px; z-index: 2;
      width: 12px; height: 12px; border-radius: 50%;
      background: #4ade80;
      border: 2px solid #0a0a0a;
    }

    .name { font-size: 1.25rem; font-weight: 600; letter-spacing: -.01em; }

    .divider { width: 100%; height: 1px; background: rgba(255,255,255,.07); }

    .socials { display: flex; gap: .6rem; flex-wrap: wrap; justify-content: center; }

    .social-btn {
      position: relative;
      width: 44px; height: 44px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      border: none;
      background: none;
      flex-shrink: 0;
    }

    .btn-face {
      position: absolute; inset: 0; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    
    .btn-face svg, .btn-face img { 
      width: 18px; 
      height: 18px; 
      fill: white; 
      position: relative; 
      z-index: 1; 
      transition: transform 0.2s ease-in-out;
    }

    /* Эффект наведения: уменьшение иконки внутри круга */
    .social-btn:hover .btn-face svg,
    .social-btn:hover .btn-face img {
      transform: scale(0.8);
    }

    /* Цвета для кнопок */
    .btn-vk      .btn-face { background: #0077FF; }
    .btn-discord .btn-face { background: #5865F2; }
    .btn-tg      .btn-face { background: #2AABEE; }
    .btn-github  .btn-face { background: #161b22; }

    .notification {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #0a0a0a;
      border: 1px solid rgba(255,255,255,.2);
      color: var(--text); font-family: var(--mono); font-size: .68rem;
      padding: .45rem 1.1rem; border-radius: 6px;
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 1000;
    }
    .notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="card">
  
  <div class="avatar-wrap">
    <div class="avatar-ring"></div>
    <div class="status-dot"></div>
  </div>

  <h1 class="name">fufuziks &lt;3</h1>

  <div class="divider"></div>

  <div class="socials">

<!-- Всплывающее уведомление для копирования Discord -->
<div id="copy-toast" class="notification">Никнейм скопирован!</div>

<script>
  function copyDiscord(username) {
    navigator.clipboard.writeText(username).then(() => {
      const toast = document.getElementById('copy-toast');
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    });
  }
</script>

</body>
</html>
