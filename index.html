<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>fufuziks</title>
  <link rel="preconnect" href="https://googleapis.com">
  <link href="https://googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mono: 'Roboto Mono', monospace;
      --bg: #000000;         
      --card-bg: #0a0a0a;    
      --card-border: rgba(255, 255, 255, 0.1);
      --text: #e8e8e8;       
      --text-muted: #666666;
      --line-color: rgba(255, 255, 255, 0.1); 
      --accent:#8a9e9b;
      --bio-color: gold; 
    }

    body.light-theme {
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --card-border: rgba(0, 0, 0, 0.08);
      --text: #1d1d1f;
      --text-muted: #86868b;
      --line-color: rgba(0, 0, 0, 0.08); 
      --bio-color: #000000; 
    }


    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      color: var(--text);
      background: radial-gradient(ellipse at top, rgba(0, 119, 255, 0.18) 0%, rgba(0, 0, 0, 0) 65%), var(--bg);
      transition: background 0.3s ease, color 0.3s ease;
    }

    body.light-theme {
      background: radial-gradient(ellipse at top, rgb(22, 74, 187) 0%, rgba(0, 0, 0, 0) 65%), var(--bg);
    }

    .card {
      position: relative;
      z-index: 10;
      width: 320px;                           
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;                      
      padding: 2.5rem 2rem;                     
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 1.2rem;                              
      box-shadow: 0 8px 48px rgba(0,0,0,0.8);
      animation: slide-top 0.5s cubic-bezier(0.250, 0.460, 0.450, 0.940) both;                         
    }

    @keyframes slide-top {
      from { opacity: 0; transform: translateY(22px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .theme-toggle {
      position: absolute;
      top: 18px;
      right: 18px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      width: 20px;   
      height: 20px;  
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle svg {
      width: 100%;
      height: 100%;
      fill: var(--text); 
      transition: transform 0.2s ease, fill 0.3s ease;
    }

    .theme-toggle:hover svg {
      transform: rotate(15deg) scale(1.1);
    }


    .title-path{
        display: flex;
        font-size: 20px;
    }



    .avatar-wrap {
        position: relative;
        width: 88px;
        height: 88px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 0.5rem; 
    }


    .avatar-wrap {
        position: relative;
        width: 88px;
        height: 88px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 0.5rem; 
    }

        body.light-theme .avatar-ring {
        border-color: rgba(0, 0, 0, 0.15);
    }


    .avatar-img {
        position: absolute; 
        inset: 0; 
        width: 100%; 
        height: 100%;
        border-radius: 9px;       
        object-fit: cover;        
        display: block;
        background: #050505;
        left: -100%
    }

     .avatar-img2 {
        position: absolute; 
        inset: 0; 
        width: 100%; 
        height: 100%;
        border-radius: 9px;       
        object-fit: cover;        
        display: block;
        background: #050505;
        left: 100%
    }



    .avatar-img3 {
        inset: 0; 
        width: 100%; 
        height: 100%;
        border-radius: 9px;       
        object-fit: cover;        
        background: #050505;
        display:flex;
        align-items: center;
        
    }


    .bio {
        font-size: 15px;
        color: var(--bio-color); 
        transition: color 0.3s ease;
    }

        .dots {
        display: flex;
        gap: 6px;
        position: absolute;
        top: 18px;
        left: 18px; 
    }

    .dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%; 
        display: inline-block;
    }

    .dots span:nth-child(1) { background: #ff5f56; } 
    .dots span:nth-child(2) { background: #ffbd2e; } 
    .dots span:nth-child(3) { background: #27c93f; } 



    .title-dath{
        font-size: 15px;
        color: #5c6670 
    }


    .links{
        display: flex;            
         justify-content: center;  
         gap: 12px;                
         margin-top: 15px;     
         
    }


    .icon-btn{
        width: 44px;
        height: 44px;
         width: 44px;              
         height: 44px;             
         border-radius: 50%;      
         border: none;             
         color: #ffffff;          
         font-family: var(--mono); 
         font-size: 1rem;
         font-weight: 600;
         cursor: pointer;   

        display: flex;
         align-items: center;
         justify-content: center;
    }
  


        .discord-color { background: #5865F2; }
        .github-color  { background: #161b22; }
        .soundclaude-color { background :#FF5500;}

.icon-btn svg {
  width: 18px;          
  height: 18px;         
  fill: #ffffff;


  transition: transform 0.2s ease-in-out; 
 }

 .icon-btn:hover svg {
  transform: scale(0.8);
}



  .cursor{
    display: flex;
    margin-left: 10px;
    width:3px;height:1em;
    background:var(--accent);
    animation:blink 1.1s step-end infinite;
    
  }
  @keyframes blink{50%{opacity:0;}}













  </style>
</head>
