<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>fufuziks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mono: 'Roboto Mono', monospace;
      --bg: #000000;         /* Черный фон страницы */
      --card-bg: #0a0a0a;    /* Темная карточка */
      --card-border: rgba(255, 255, 255, 0.1);
      --avatar-border: rgba(255, 255, 255, 0.2); /* Полупрозрачная белая рамка */
      --text: #e8e8e8;       /* Белый текст имени */
      --text-muted: #666666; /* Серый текст описания */
      --line-color: rgba(255, 255, 255, 0.1); /* Полупрозрачные полосы */
    }

      html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      color: var(--text);
      background: rgb(0, 0, 0); 
    }

                         

    .card {
      position: relative;
      z-index: 10;
      width: 320px;
      height: 450px;                             
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;                      
      padding: 2.5rem 2rem;                     
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 1.2rem;                              
      box-shadow: 0 8px 48px rgba(0,0,0,0.8);
      animation: slide-top 0.5s cubic-bezier(0.250, 0.460, 0.450, 0.940) both;                         
    }

      @keyframes slide-top {
      from { opacity:0; transform:translateY(22px) scale(.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }


    .avatar-wrap {
      position: relative;
      width: 88px; 
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.5rem; 
    }

    .avatar-ring{
      position: absolute;
      width: -4px;
      border-radius: 50%;
      border: 1px solid rgb(255, 255, 255, 0.25);
      z-index: 0;
    }


      .avatar-img {
      position: absolute; 
      inset: 0; 
      z-index: -4px;
      width: 88px; 
      height: 88px;
      border-radius: 50%;       
      object-fit: cover;        
      display: block;
      background: #050505;
    }

    .name {
      font-size: 25px;

    }
     
    .line {
      width: 100%;
      height: 2px;
      background: var(--line-color);
      margin: 1px;
    }

    .mid-text{
      font-size: 15px;
      color: rgba(0, 160, 240, 1);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      color: var(--text);
      
      /* ЭФФЕКТ ФОНАРИКА: Синий луч света падает строго сверху вниз и рассеивается */
      background: radial-gradient(ellipse at top, rgba(0, 119, 255, 0.18) 0%, rgba(0, 0, 0, 0) 65%), #000000;
      
      transition: background 0.4s ease; /* Чтобы фон плавно переключался на светлую тему */
    }


    /* Стили музыкального плеера */
.music-player {
  width: 100%;
  background: rgba(0,0,0,.5);
  border: 1px solid rgba(0, 0, 0, 0.08);
  border-radius: 10px; 
  padding: .85rem 1rem;
  display: grid; 
  grid-template-columns: 44px 1fr auto;
  gap: .7rem; 
  align-items: center;
}





.track-title { 
  font-size: .76rem; 
  font-weight: 500; 
  color: var(--text); 
  white-space: nowrap; 
  overflow: hidden; 
  text-overflow: ellipsis; 
}

.track-artist { 
  font-size: .65rem; 
  color: var(--muted); 
  margin-top: .1rem; 
}

.track-artist a { 
  color: var(--muted); 
  text-decoration: none; 
  transition: color .2s; 
}

.track-artist a:hover { 
  color: var(--text); 
}

.progress-container { 
  display: flex; 
  align-items: center; 
  gap: .35rem; 
  margin-top: .45rem; 
}

.time-label { 
  font-size: .57rem; 
  color: #e95151; 
  min-width: 26px; 
}

.time-label.right { 
  text-align: right; 
}

.progress-bar { 
  flex: 1; 
  height: 3px; 
  background: rgba(199, 102, 102, 0.1); 
  border-radius: 2px; 
  cursor: pointer; 
}

.progress-fill { 
  height: 100%; 
  background: linear-gradient(90deg,#f5c842,#e07c3a); 
  border-radius: 2px; 
  width: 0%; 
  transition: width .3s linear; 
}

.controls { 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  gap: .45rem; 
}

.play-btn {
  background: rgba(0, 0, 0, 0.07);
  border: 1px solid rgba(165, 58, 58, 0.18);
  border-radius: 50%; 
  width: 32px; 
  height: 32px;
  display: flex; 
  align-items: center; 
  justify-content: center;
  cursor: pointer; 
  color: var(--text);
  transition: background .2s, border-color .2s;
}

.play-btn:hover { 
  background: rgba(235, 40, 40, 0.15); 
  border-color: #ff0000; 
}

.play-btn svg { 
  width: 13px; 
  height: 13px; 
  fill: currentColor; 
}

.vol-slider {
  -webkit-appearance: none; 
  appearance: none;
  width: 48px; 
  height: 3px;
  background: rgba(233, 125, 125, 0.1); 
  border-radius: 2px; 
  outline: none;
}

.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 9px; 
  height: 9px;
  border-radius: 35%; 
  background: #291b1b; 
  cursor: pointer;
}

audio { display: none; }



  </style>
</head>

    <h1 class="name">fufuziks</h1>


    <div class="line"></div>
    <!-- Текст посередине -->
    <p class="mid-text">даже елси ты толстый то никогда об этом не переживай ведь животик это всегда хорошо</p>
    <!-- Нижняя линия -->
    <div class="line"></div>

<div class="music-player">
  <div class="cover-art">

  </div>

  <div class="track-info">
    <div class="track-title">sigma</div>
    <div class="track-artist"><a href="#" target="_blank">fufuziks</a></div>
    <div class="progress-container">
      <span class="time-label" id="cur-time">00:00</span>
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="time-label right" id="tot-time">00:00</span>
    </div>
  </div>

  <div class="controls">
    <button class="play-btn" onclick="togglePlay()">
      <svg id="play-icon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <input type="range" class="vol-slider" min="0" max="100" value="50" oninput="setVol(this.value)">
  </div>
</div>

<audio id="audio" src="sigma.mp3"></audio>
<script>


  // Основные функции управления плеером
const audio = document.getElementById('audio');
const fill = document.getElementById('progress-fill');
const curEl = document.getElementById('cur-time');
const totEl = document.getElementById('tot-time');
const playI = document.getElementById('play-icon');
const pauseI = document.getElementById('pause-icon');
const bar = document.getElementById('progress-bar');

function fmt(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
}

function togglePlay() {
  if (!audio.src || audio.src === window.location.href) {
    notify('Добавь mp3 в <audio src="">');
    return;
  }
  if (audio.paused) {
    audio.play();
    playI.style.display = 'none';
    pauseI.style.display = 'block';
  } else {
    audio.pause();
    playI.style.display = 'block';
    pauseI.style.display = 'none';
  }
}

function setVol(v) {
  audio.volume = v / 100;
}

// События аудио
audio.addEventListener('loadedmetadata', () => {
  totEl.textContent = fmt(audio.duration);
});

audio.addEventListener('timeupdate', () => {
  curEl.textContent = fmt(audio.currentTime);
  fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
});

audio.addEventListener('ended', () => {
  playI.style.display = 'block';
  pauseI.style.display = 'none';
  fill.style.width = '0%';
  curEl.textContent = '00:00';
});

// Клик по прогресс-бару для перемотки
bar.addEventListener('click', e => {
  if (!audio.duration) return;
  const r = bar.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});
</script>
